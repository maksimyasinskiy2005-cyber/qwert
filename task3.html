<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Лабораторна робота — Завдання 3</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    input[type="text"] {
      display: block;
      width: 300px;
      margin-bottom: 15px;
      padding: 8px;
    }
    #output {
      background-color: #1663de;
      border: 1px solid #0ea8b3;
    }
  </style>
</head>
<body>
  <h2>Робота з подіями onChange та onSelect</h2>

  <label>Перше текстове поле:</label>
  <input type="text" id="input1" placeholder="Введіть текст...">

  <label>Друге текстове поле (результат):</label>
  <input type="text" id="output" readonly>

  <script>
    const input1 = document.getElementById("input1");
    const output = document.getElementById("output");

    // Подія зміни тексту
    input1.onchange = function() {
      output.value = "onChange: Ви змінили текст на → " + input1.value;
    };

    // Подія виділення тексту
    input1.onselect = function() {
      output.value = "onSelect: Ви виділили частину тексту!";
    };
  </script>
</body>
</html>
