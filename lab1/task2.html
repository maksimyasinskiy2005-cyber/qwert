    <h3>Завдання 2</h3>
    <p>Обчислення формули F = (x * z) / y</p>

    <form>
        Введіть x: <input type="number" id="x"><br><br>
        Введіть y: <input type="number" id="y"><br><br>
        Введіть z: <input type="number" id="z"><br><br>
        <input type="button" value="Обчислити F" onclick="calculateF()">
    </form>

    <p id="result"></p>

    <script>
        function calculateF() {
            // Зчитуємо значення з полів
            let x = parseFloat(document.getElementById("x").value);
            let y = parseFloat(document.getElementById("y").value);
            let z = parseFloat(document.getElementById("z").value);

            // Перевірка на ділення на 0
            if (y === 0) {
                alert("Помилка: ділення на нуль неможливе!");
                return;
            }

            // Обчислення формули
            let F = (x * z) / y;

            // Вивід результату
            document.getElementById("result").innerHTML = "Результат F = " + F.toFixed(2);
        }
    </script>
