<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Лабораторна робота — Завдання 4</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #692727;
    }
    .container {
      background: rgb(255, 255, 255);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    input {
      width: 100%;
      margin: 10px 0;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background-color: #2b7cff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #195ccc;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Обчислення функції F</h2>
    <label>Введіть x:</label>
    <input type="number" id="x" step="any" placeholder="Введіть x">

    <label>Введіть y:</label>
    <input type="number" id="y" step="any" placeholder="Введіть y">

    <button onclick="calculate()">Обчислити</button>

    <p id="result"></p>
  </div>

  <script>
    function calculate() {
      let x = parseFloat(document.getElementById('x').value);
      let y = parseFloat(document.getElementById('y').value);
      let F;

      if (isNaN(x) || isNaN(y)) {
        document.getElementById('result').textContent = "Будь ласка, введіть обидва значення!";
        return;
      }

      if (x !== y) {
        F = 10 * x + y;
      } else if (y ** 2 !== 2 * x * y || y < 0) {
        F = 2 * x * y + 4 * x / y;
      } else {
        F = x + y ** 2;
      }

      document.getElementById('result').textContent = `Результат F = ${F.toFixed(3)}`;
    }
  </script>
</body>
</html>
