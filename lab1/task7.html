<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Завдання 7 — Вибір товару зі списку</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      margin: 40px;
    }
    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 450px;
    }
    select, input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #2b7cff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #195ccc;
    }
    .field {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
    <div class="container">
      <h3>Завдання 7</h3>
    <h2>Склад — вибір товару</h2>

    <label for="product">Оберіть товар:</label>
    <select id="product">
      <option value="">-- Виберіть товар --</option>
      <option value="0">Дриль</option>
      <option value="1">Дошка</option>
      <option value="2">Диски</option>
      <option value="3">Датчик</option>
      <option value="4">Диван</option>
    </select>

    <button onclick="fun1()">Наявна кількість і вартість</button>
    <button onclick="fun2()">Загальна сума</button>

    <div id="output">
      <div id="quantity" class="field"></div>
      <div id="price" class="field"></div>
      <div id="total" class="field"></div>
    </div>
  </div>

  <script>
    // 🔹 Масиви
    const names = ["Дриль", "Дошка", "Диски", "Датчик", "Диван"];
    const quantity = [5, 12, 20, 8, 2];
    const price = [2500, 300, 150, 800, 9500];

    // 🔹 Глобальна змінна для індексу вибраного товару
    let index = -1;

    // Функція 1 — показує кількість і ціну
    function fun1() {
      const select = document.getElementById("product");
      index = select.value;

      const qField = document.getElementById("quantity");
      const pField = document.getElementById("price");
      const tField = document.getElementById("total");
      tField.textContent = ""; // очищаємо попередній результат

      if (index === "") {
        qField.textContent = "Оберіть товар зі списку!";
        pField.textContent = "";
        return;
      }

      qField.textContent = `Наявна кількість: ${quantity[index]} шт.`;
      pField.textContent = `Ціна за одиницю: ${price[index]} грн.`;
    }

    // Функція 2 — обчислює загальну суму
    function fun2() {
      const tField = document.getElementById("total");

      if (index === "" || index === -1) {
        tField.textContent = "Спочатку оберіть товар!";
        return;
      }

      const total = quantity[index] * price[index];
      tField.textContent = `Загальна вартість товару "${names[index]}" = ${total} грн.`;
    }
  </script>
</body>
</html>
