<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Завдання 5 — Обчислення суми ряду</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 40px;
    }
    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 420px;
    }
    input {
      width: 100%;
      margin: 10px 0;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background-color: #2b7cff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #195ccc;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
    <div class="container">
      <h3>Завдання 5</h3>
    <h2>Обчислення суми ряду</h2>

    <label>Введіть x:</label>
    <input type="number" id="x" step="any" placeholder="Введіть x">

    <label>Введіть y:</label>
    <input type="number" id="y" step="any" placeholder="Введіть y">

    <button onclick="calculate()">Обчислити суму</button>

    <p id="result"></p>
  </div>

  <script>
    // Функція для обчислення факторіалу
    function factorial(n) {
      let result = 1;
      for (let i = 2; i <= n; i++) {
        result *= i;
      }
      return result;
    }

    function calculate() {
      let x = parseFloat(document.getElementById('x').value);
      let y = parseFloat(document.getElementById('y').value);

      if (isNaN(x) || isNaN(y)) {
        document.getElementById('result').textContent = "Будь ласка, введіть обидва значення!";
        return;
      }

      let S = 0;
      for (let i = 2; i <= 7; i++) {
        let term = Math.pow(-1, i + 1) * (0.85 * i + (x * y) / (1 + x ** 2)) / factorial(i);
        S += term;
      }

      document.getElementById('result').textContent = `Сума ряду S = ${S.toFixed(6)}`;
    }
  </script>
</body>
</html>
